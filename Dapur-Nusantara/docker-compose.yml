version: '3.8'

services:
  mysql-user:
    image: mysql:8.0
    container_name: mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: user_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-menu:
    image: mysql:8.0
    container_name: mysql-menu
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: menu_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_menu_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-order:
    image: mysql:8.0
    container_name: mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: order_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_order_data:/var/lib/mysql
      - ./order-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql-user
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: user_db
    depends_on:
      mysql-user:
        condition: service_healthy
    networks:
      - app-network

  # Menu Service
  menu-service:
    build: ./menu-service
    container_name: menu-service
    ports:
      - "3003:3003"
    environment:
      DB_HOST: mysql-menu
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: menu_db
    depends_on:
      mysql-menu:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./menu-service/images:/app/images

  # Order Service
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      DB_HOST: mysql-order
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: order_db
      MENU_SERVICE_URL: http://menu-service:3003
    depends_on:
      mysql-order:
        condition: service_healthy
      menu-service:
        condition: service_started
    networks:
      - app-network

  # GraphQL Backend
  backend:
    build: ./backend
    container_name: graphql-backend
    ports:
      - "4000:4000"
    environment:
      USER_SERVICE_URL: http://user-service:3001
      MENU_SERVICE_URL: http://menu-service:3003
      ORDER_SERVICE_URL: http://order-service:3002
    depends_on:
      - user-service
      - menu-service
      - order-service
    networks:
      - app-network

  # Frontend
  frontend:
    build: ./food-delivery-frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_user_data:
  mysql_menu_data:
  mysql_order_data:

